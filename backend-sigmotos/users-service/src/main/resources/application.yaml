server:
  port: 8081

spring:
  application:
    name: users-service

  datasource:
    url: jdbc:postgresql://localhost:5432/users_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka